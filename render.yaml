services:
  - type: web
    name: inventario-ventas-api
    runtime: docker
    dockerfilePath: Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: VENDEDOR_PASSWORD
        sync: false
      - key: CREATE_DEV_USERS
        value: "true"
      - key: NODE_ENV
        value: "production"
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: CORS_ORIGIN
        value: "https://inventario-ventas-web.netlify.app"
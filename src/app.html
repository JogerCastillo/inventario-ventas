<!doctype html>
<html lang="es">
	<head>

		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<script>
			var theme = localStorage.getItem('inventario_ventas_theme');

			document.documentElement.classList.toggle('dark', theme === 'dark');
